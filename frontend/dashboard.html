<!DOCTYPE html>
<html>
<head>
  <title>Patient Dashboard</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .status {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>❤️ Patient Dashboard</h1>

  <div class="card">
    <h2>Heart Rate</h2>
    <p id="heart" class="status">Loading...</p>
  </div>

  <div class="card">
    <h2>Water</h2>
    <p id="water" class="status">Loading...</p>
  </div>

  <div class="card">
    <h2>Food</h2>
    <p id="food" class="status">Loading...</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
